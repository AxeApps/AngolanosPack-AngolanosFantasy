name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read publish config
        run: |
          echo "MODRINTH_ID=$(grep '^modrinthProjectId=' publish.properties | cut -d= -f2)" >> $GITHUB_ENV
          echo "CURSEFORGE_ID=$(grep '^curseforgeProjectId=' publish.properties | cut -d= -f2)" >> $GITHUB_ENV

      - name: Install Packwiz
        run: |
          curl -L https://github.com/packwiz/packwiz/releases/latest/download/packwiz-linux-amd64 -o packwiz
          chmod +x packwiz

      - name: Refresh index
        run: ./packwiz refresh

      - name: Export Modrinth pack
        run: ./packwiz modrinth export

      - name: Export CurseForge pack
        run: ./packwiz curseforge export

      - name: Rename outputs
        run: |
          mv *.mrpack AngolanosFantasy.mrpack
          mv *.zip AngolanosFantasy.zip

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AngolanosFantasy.zip
            AngolanosFantasy.mrpack

      - name: Upload to Modrinth
        if: env.MODRINTH_ID != ''
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ env.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: AngolanosFantasy.mrpack
          version: ${{ github.ref_name }}

      - name: Upload to CurseForge
        if: env.CURSEFORGE_ID != ''
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ env.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: AngolanosFantasy.zip
          version: ${{ github.ref_name }}