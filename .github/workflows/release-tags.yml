name: Release Tags

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read publish config
        run: |
          echo "MODRINTH_ID=$(grep '^modrinthProjectId=' publish.properties | cut -d= -f2)" >> $GITHUB_ENV
          echo "CURSEFORGE_ID=$(grep '^curseforgeProjectId=' publish.properties | cut -d= -f2)" >> $GITHUB_ENV

      - name: Setup Go (cached)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Packwiz
        run: |
          go install github.com/packwiz/packwiz@v0.3.0
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Refresh pack
        run: packwiz refresh

      - name: Build Modrinth MRPACK
        run: packwiz modrinth export || true

      - name: Build CurseForge ZIP
        run: packwiz curseforge export || true

      - name: Rename outputs
        run: |
          if ls *.mrpack 1> /dev/null 2>&1; then
            mv *.mrpack AngolanosFantasy.mrpack
          fi
          if ls *.zip 1> /dev/null 2>&1; then
            mv *.zip AngolanosFantasy.zip
          fi

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AngolanosFantasy.zip
            AngolanosFantasy.mrpack

      - name: Upload to Modrinth
        if: env.MODRINTH_ID != ''
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ env.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: AngolanosFantasy.mrpack
          version: ${{ github.ref_name }}

      - name: Upload to CurseForge
        if: env.CURSEFORGE_ID != ''
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ env.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: AngolanosFantasy.zip
          version: ${{ github.ref_name }}