name: Build & Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go (cached)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Refresh pack
        run: packwiz refresh

      - name: Build Modrinth MRPACK
        run: packwiz modrinth export || true

      - name: Build CurseForge ZIP
        run: packwiz curseforge export || true

      - name: Rename outputs
        run: |
          if ls *.mrpack 1> /dev/null 2>&1; then
            mv *.mrpack AngolanosFantasy.mrpack
          fi
          if ls *.zip 1> /dev/null 2>&1; then
            mv *.zip AngolanosFantasy.zip
          fi

      - name: Upload artifacts (no release)
        uses: actions/upload-artifact@v4
        with:
          name: modpack-build
          path: |
            AngolanosFantasy.zip
            AngolanosFantasy.mrpack
          if-no-files-found: ignore