# Configuration file

chat {
    # Enable player faces in chat [default: true]
    B:enableFacesInChat=true

    # Enable faces in Tabby Chat [default: true]
    B:enableFacesInTabbyChat=true

    # Face X offset [range: -10.0 ~ 10.0, default: 1.0]
    S:faceXOffset=1.0

    # Face X offset (TabbyChat) [range: -10.0 ~ 10.0, default: 1.0]
    S:faceXOffsetTabbyChat=1.0
}


debug {
    # Server debug: inject sample player profiles into ping response from config/debug_uuids.json [default: false]
    B:debugInjectServerStatusProfiles=false

    # Server debug: maximum number of profiles injected from config/debug_uuids.json [range: 1 ~ 10000, default: 5]
    I:debugInjectServerStatusProfilesCount=5

    # Enable debug logging [default: false]
    B:debugMode=false

    # Server debug: prefix added to all player names in the tab list via a scoreboard team. Useful for testing column width with rank-style prefixes. Empty to disable. [default: ]
    S:debugTabListPrefix=
}


general {
    # Force new skin layout rendering. May fix mods similar to Skinport or Simple Skin Backport. [default: false]
    B:forceNewSkinCompat=false
}


servermenu {
    # Enable faces in server selection menu [default: true]
    B:enableFacesInServerMenu=true
}


tabmenu {
    # Enable player faces in the server tab menu [default: true]
    B:enableFacesInTabMenu=true

    # Seconds before a failed or placeholder skin resolution is retried [range: 10 ~ 2147483647, default: 60]
    I:failedRetrySeconds=60

    # Show question mark instead of Steve when a skin can't load [default: true]
    B:showQuestionMarkIfUnknown=true

    # Seconds before a skin is refreshed [range: 60 ~ 2147483647, default: 1200]
    I:skinTtl=1200

    # Interval in seconds for skin GC [range: 10 ~ 2147483647, default: 120]
    I:skinTtlInterval=120

    # Trim tab list to match number of players [default: true]
    B:trimTabMenu=true

    # Extra pixels added to measured column width. Useful to account for server rank prefixes that may not be visible during measurement. [range: 0 ~ 200, default: 0]
    I:trimTabMenuExtraWidth=0

    # Maximum column width in pixels when trim tab menu is enabled. Columns widen to fit the longest player name, up to this cap. [range: 50 ~ 500, default: 250]
    I:trimTabMenuMaxColumnWidth=250
}


