# Configuration file

general {
    # Allow the server to run scripts on the client. If disabled, no server scripts will execute client-side.
    B:"Allow Client Scripts"=true

    # How long should downloaded imagery data be saved client side? (In minutes)
    I:"Cache Life"=10
}


hud {
    # Use rounded square instead of circle slots
    B:"Ability Hotbar Alt Texture"=true

    # Enable Ability Hotbar HUD Component
    B:"Ability Hotbar Enabled"=true

    # Display horizontally instead of vertically
    B:"Ability Hotbar Horizontal"=false

    # Scale percentage
    I:"Ability Hotbar Scale"=227

    # Always show hotbar (false = only while HUD key is held)
    B:"Ability Hotbar Show Always"=true

    # Text label position (1=Above/Left, 2=Below/Right)
    I:"Ability Hotbar Text Position"=2

    # Text visibility (0=Shown, 1=Hidden, 2=Held)
    I:"Ability Hotbar Text Visibility"=0

    # Max visible slots in hotbar (3, 5, or 7)
    I:"Ability Hotbar Visible Slots"=5

    # Horizontal position (0-100 percentage)
    D:"Ability Hotbar X"=0.0

    # Vertical position (0-100 percentage)
    D:"Ability Hotbar Y"=43.0

    # Enable Compass Hud Component
    B:"Compass Hud Enabled"=true

    # Scale percentage of compass overlay
    I:"Compass Hud Scale"=344

    # Base width of compass bar in pixels
    I:"Compass Hud Width"=158

    # Horizontal position of compass overlay (0-100 percentage)
    D:"Compass Hud X"=36.0

    # Vertical position of compass overlay (0-100 percentage)
    D:"Compass Hud Y"=0.0

    # Scale percentage of the quest overlay.
    I:"Quest Hud Scale"=246

    # Text alignment in quest overlay (0: Left, 1: Center, 2: Right).
    I:"Quest Hud Text Alignment"=0

    # X position of the quest overlay.
    D:"Quest Hud X"=0.0

    # Y position of the quest overlay.
    D:"Quest Hud Y"=14.0
}


model {
    B:"Legacy Anvil Model"=false
    B:"Legacy Banner Model"=false
    B:"Legacy Barrel Model"=false
    B:"Legacy Campfire Model"=false
    B:"Legacy Candle Model"=false
    B:"Legacy Carpentry Bench Model"=false
    B:"Legacy Chair Model"=false
    B:"Legacy Couch Model"=false
    B:"Legacy Lantern Model"=false
    B:"Legacy Mailbox Model"=false
    B:"Legacy Pedestal Model"=false
    B:"Legacy Stool Model"=false
    B:"Legacy Table Model"=false
    B:"Legacy Tall Lamp Model"=false
}


rendering {
    # Disables most Energy Explosion voxel rendering and keeps particle effects only.
    B:"Low Res Explosion"=false

    # After this many ticks alive, proximity alpha fade is disabled (projectile always renders at full alpha). Does not apply while charging or to attached beams/lasers.
    I:"Proximity Alpha Age Ticks"=60

    # Distance in blocks at which owner's energy projectiles reach full alpha.
    D:"Proximity Alpha Distance"=7.0

    # Minimum alpha for owner's energy projectiles when very close to camera. Set to 1.0 to disable proximity fade.
    D:"Proximity Alpha Min"=0.15
}


texture {
    B:"DEBUG: Better handling of image downloads: "=true

    # Models like Chairs and Stools will use default MC Wood Textures
    B:"Wood Textures"=false
}


visual {
    # Universal enable/disable for Banner Alerts
    B:"All Banner Alerts"=true

    # Universal enable/disable for Banner Alerts
    B:"All Chat Alerts"=true

    # Enable the use of Custom Font for Chat Bubbles
    B:"Chat Bubbles Font Type"=false

    # Only for dialogs with sounds
    B:"Dialog Sound"=true

    # Only set for gradual dialogs
    B:"Dialog Speed"=true

    # Enable/Disable Chat Bubbles
    B:"Enable Chat Bubbles"=true

    # Enable the Faction Tab
    B:"Enable Faction Tab"=true

    # Enable/Disable Inventory Tabs
    B:"Enable Inventory Tabs"=true

    # Font size for custom fonts (doesn't work with minecrafts font)
    I:"Font Size"=18

    # When set to Minecraft it will use minecrafts font, when Default it will use OpenSans. Can only use fonts installed on your PC
    S:"Font Type"=Default

    # Hides CNPC+ Inventory Effects Bar
    B:"Hide Effects Bar"=false
}


