# Configuration file

market {

    ##########################################################################################################
    # currency
    #--------------------------------------------------------------------------------------------------------#
    # CNPC+ Currency system settings. When UseVault is enabled, all currency operations use Vault instead of the built-in system.
    ##########################################################################################################

    currency {
        # If true, use Vault API for all currency operations instead of CNPC+ built-in currency. The built-in currency data will be preserved but unused.
        B:"Use Vault"=false

        # Display name for the currency (e.g. 'Coins', 'Gold', 'Credits')
        S:"Currency Name"=Coins

        # Starting currency balance for new players
        S:"Starting Balance"=0

        # Maximum currency balance a player can have
        S:"Max Balance"=9223372036854775807
    }

    ##########################################################################################################
    # auction
    #--------------------------------------------------------------------------------------------------------#
    # Auction system settings. The Auction allows players to list items for sale with bidding and buyout options.
    ##########################################################################################################

    auction {
        # Enable the Auction system
        B:"Enable Auction"=true

        # Default duration for auctions in hours
        I:"Auction Duration Hours"=24

        # Flat fee charged when creating a listing
        S:"Listing Fee"=10

        # Minimum starting price for auction listings
        S:"Minimum Listing Price"=1

        # Percentage of sale price taken as tax (0.05 = 5%). Tax is deleted as a currency sink.
        D:"Sales Tax Percent"=0.05

        # Default maximum number of trade slots per player (listings + bids + claims). Min: 1, Max: 45. Players can have more via customnpcs.auction.trades.X permissions.
        I:"Default Max Trades"=8

        # When a bid is placed with less than this many minutes remaining, the auction is extended to this duration
        I:"Snipe Protection Minutes"=2

        # Number of days before unclaimed items/currency are deleted
        I:"Claim Expiration Days"=20

        # Minimum bid increment as a percentage of current bid (0.05 = 5%)
        D:"Min Bid Increment Percent"=0.05

        # Percentage of current bid taken as penalty when seller cancels an auction with bids (0.10 = 10%)
        D:"Cancellation Penalty Percent"=0.1

        ##########################################################################################################
        # blacklist
        #--------------------------------------------------------------------------------------------------------#
        # Item Blacklist settings for the Auction House.
        # Prevents specific items, mods, or items with certain NBT tags from being listed.
        # 
        # ITEM FORMAT: Use 'modid:itemname' format (e.g., 'minecraft:bedrock', 'customnpcs:npcWand')
        # WILDCARDS: Use * for wildcards (e.g., 'customnpcs:npc*' blocks all items starting with 'npc')
        # MOD FORMAT: Use just the mod ID (e.g., 'projecte' blocks all items from that mod)
        # NBT FORMAT: Use the NBT tag key name (e.g., 'AdminOnly' blocks items with that tag)
        ##########################################################################################################

        blacklist {
            # Enable item blacklist checking when creating listings
            B:"Enable Blacklist"=true

            # Items that cannot be listed on the Auction House.
            # Format: modid:itemname (supports * wildcards)
            # Example: 'minecraft:diamond_sword' or 'customnpcs:npc*'
            S:"Blacklisted Items" <
                minecraft:bedrock
                minecraft:command_block
                customnpcs:npcWand
                customnpcs:npcMobCloner
                customnpcs:npcScripter
                customnpcs:npcMovingPath
                customnpcs:npcMounter
                customnpcs:npcTeleporter
                customnpcs:npcTool
                customnpcs:npcSoulstoneFilled
             >

            # All items from these mods are blocked from the Auction House.
            # Format: modid (e.g., 'projecte', 'thaumcraft')
            S:"Blacklisted Mods" <
             >

            # Items containing any of these NBT tag keys are blocked.
            # Checks the root level of the item's NBT compound.
            # Example: 'AdminOnly', 'CreativeMode'
            S:"Blacklisted NBT Tags" <
             >
        }

        ##########################################################################################################
        # logging
        #--------------------------------------------------------------------------------------------------------#
        # Auction logging settings. Enable specific log types to track auction activity.
        ##########################################################################################################

        logging {
            # Master switch for auction logging. If false, no auction events are logged.
            B:"Enable Auction Logging"=false

            # Log when auctions are created
            B:"Log Created"=true

            # Log when bids are placed
            B:"Log Bid"=true

            # Log when auctions are bought out
            B:"Log Buyout"=true

            # Log when auctions end with a winner
            B:"Log Sold"=true

            # Log when auctions expire with no bids
            B:"Log Expired"=true

            # Log when auctions are cancelled
            B:"Log Cancelled"=true

            # Log when claims are collected
            B:"Log Claimed"=true
        }

    }

}


